unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
set -g pane-base-index 1

bind r source-file ~/.tmux.conf \; display "tmux reloaded"

set -sg escape-time 0
set -g status-left '#{?client_prefix,⌨ PREFIX ,}'
bind -n PageUp copy-mode -u

# Fast window switching without prefix (home row mod friendly)
bind -n M-2 select-window -t 1
bind -n M-3 select-window -t 2
bind -n M-4 select-window -t 3

# Active pane highlight
set -g pane-border-lines heavy
set -g pane-active-border-style fg=colour205
set -g pane-border-style fg=colour238

# Fast pane switching without prefix
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R
